<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda tu Pedido - Todo Popi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdf2f8; /* pink-50 */
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        h1, h2, h3, .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .gold-gradient {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-gold {
            background: linear-gradient(to right, #d4af37, #f3e5ab, #d4af37);
            color: #5c0011;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(212, 175, 55, 0.4);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 text-gray-800">

    <div class="max-w-lg mx-auto glass-card rounded-3xl shadow-2xl overflow-hidden relative">
        <!-- Decoración superior -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-300 via-rose-400 to-pink-300"></div>

        <!-- Header -->
        <div class="text-center pt-10 pb-6 px-6 border-b border-pink-100">
            <h1 class="text-5xl font-bold text-black tracking-tighter mb-2">Todo <span class="text-6xl italic">Popi</span></h1>
            <p class="text-rose-800 font-serif text-xl italic mt-2">"Donde cada detalle enamora"</p>
            <div class="inline-block mt-4 px-4 py-1 rounded-full bg-rose-100 text-rose-700 text-sm font-semibold tracking-wider">
                ESPECIAL DÍA DE LAS MADRES 💖
            </div>
        </div>

        <!-- Formulario -->
        <form id="pedidoForm" class="p-6 md:p-8 space-y-6">
            
            <!-- Datos del Cliente -->
            <div class="space-y-4">
                <h3 class="font-serif text-xl text-rose-900 border-b border-pink-200 pb-2 flex items-center">
                    <span>👤</span> <span class="ml-2">Tus Datos</span>
                </h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" required class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:ring-2 focus:ring-rose-400 focus:border-rose-400 outline-none transition-all bg-white/50" placeholder="Ej. María Pérez">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Entrega</label>
                    <input type="date" id="fecha" required class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:ring-2 focus:ring-rose-400 focus:border-rose-400 outline-none transition-all bg-white/50">
                </div>
            </div>

            <!-- Selección de Arreglos -->
            <div class="space-y-4 mt-8">
                <h3 class="font-serif text-xl text-rose-900 border-b border-pink-200 pb-2 flex items-center">
                    <span>💐</span> <span class="ml-2">Elige tu Arreglo Principal</span>
                </h3>
                <div class="grid grid-cols-1 gap-3">
                    <label class="flex items-center p-4 border border-pink-200 rounded-xl cursor-pointer hover:bg-pink-50 transition-colors">
                        <input type="radio" name="arreglo" value="Ramo de Flores Clásico" class="w-5 h-5 text-rose-500 focus:ring-rose-500 border-gray-300">
                        <span class="ml-3 font-medium text-gray-700">Arreglo Floral Clásico 🌹</span>
                    </label>
                    <label class="flex items-center p-4 border border-pink-200 rounded-xl cursor-pointer hover:bg-pink-50 transition-colors">
                        <input type="radio" name="arreglo" value="Ramo estilo Ropa (Deportiva/Íntima)" class="w-5 h-5 text-rose-500 focus:ring-rose-500 border-gray-300">
                        <span class="ml-3 font-medium text-gray-700">Ramo de Ropa (Estilo Vibra Flow) 👚</span>
                    </label>
                    <label class="flex items-center p-4 border border-pink-200 rounded-xl cursor-pointer hover:bg-pink-50 transition-colors">
                        <input type="radio" name="arreglo" value="Desayuno Sorpresa" class="w-5 h-5 text-rose-500 focus:ring-rose-500 border-gray-300">
                        <span class="ml-3 font-medium text-gray-700">Bandeja de Desayuno Especial 🥐☕</span>
                    </label>
                </div>
            </div>

            <!-- Complementos (Pastelitos, etc) -->
            <div class="space-y-4 mt-8">
                <h3 class="font-serif text-xl text-rose-900 border-b border-pink-200 pb-2 flex items-center">
                    <span>🥟</span> <span class="ml-2">Complementos (Bandejas)</span>
                </h3>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Bandeja de Pastelitos</label>
                    <select id="pastelitos" class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:ring-2 focus:ring-rose-400 focus:border-rose-400 outline-none transition-all bg-white/50">
                        <option value="Ninguno">No deseo pastelitos</option>
                        <option value="Bandeja de 6 unidades">Bandeja de 6 unidades</option>
                        <option value="Bandeja de 12 unidades">Bandeja de 12 unidades</option>
                        <option value="Bandeja de 24 unidades">Bandeja de 24 unidades</option>
                        <option value="Cantidad Personalizada">Cantidad personalizada (especificar abajo)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Globos o Mensaje Extra</label>
                    <div class="flex items-center space-x-4">
                        <label class="flex items-center">
                            <input type="checkbox" id="incluyeGlobo" class="w-4 h-4 text-rose-500 rounded border-gray-300 focus:ring-rose-500">
                            <span class="ml-2 text-sm text-gray-700">Incluir Globo 🎈</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="incluyeTarjeta" class="w-4 h-4 text-rose-500 rounded border-gray-300 focus:ring-rose-500">
                            <span class="ml-2 text-sm text-gray-700">Tarjeta Personalizada 💌</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Detalles adicionales -->
            <div class="space-y-4 mt-8">
                <h3 class="font-serif text-xl text-rose-900 border-b border-pink-200 pb-2 flex items-center">
                    <span>📝</span> <span class="ml-2">Detalles Específicos</span>
                </h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">¿Algún color en especial, talla de ropa (si eligió el ramo de ropa), o instrucción para la entrega?</label>
                    <textarea id="detalles" rows="3" class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:ring-2 focus:ring-rose-400 focus:border-rose-400 outline-none transition-all bg-white/50 resize-none" placeholder="Ej. Quiero que las flores sean rosadas, o la ropa deportiva en talla M..."></textarea>
                </div>
            </div>

            <!-- Botón de Envío -->
            <div class="pt-6">
                <button type="button" onclick="enviarWhatsApp()" class="w-full btn-gold text-lg font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
                    ENVIAR PEDIDO POR WHATSAPP
                </button>
                <p class="text-center text-xs text-gray-500 mt-4 flex items-center justify-center gap-1">
                    🔒 Serás redirigido a WhatsApp para confirmar detalles y pago.
                </p>
            </div>
        </form>
    </div>

    <!-- Script para generar enlace de WhatsApp -->
    <script>
        function enviarWhatsApp() {
            const numeroWhatsApp = "18097138463"; 
            
            // Recoger datos
            const nombre = document.getElementById('nombre').value;
            const fecha = document.getElementById('fecha').value;
            
            if(!nombre || !fecha) {
                alert("Por favor llena tu nombre y la fecha de entrega.");
                return;
            }

            // Arreglo
            let arreglo = "No especificado";
            const arregloRadios = document.getElementsByName('arreglo');
            for(let radio of arregloRadios) {
                if(radio.checked) {
                    arreglo = radio.value;
                    break;
                }
            }

            // Pastelitos
            const pastelitos = document.getElementById('pastelitos').value;
            
            // Extras
            const globo = document.getElementById('incluyeGlobo').checked ? "Sí" : "No";
            const tarjeta = document.getElementById('incluyeTarjeta').checked ? "Sí" : "No";
            
            // Detalles
            const detalles = document.getElementById('detalles').value;

            // Construir el mensaje
            let mensaje = `*💖 ¡Hola TODO POPI! Quiero agendar un pedido de Madres:* 💖\n\n`;
            mensaje += `*👤 A nombre de:* ${nombre}\n`;
            mensaje += `*📅 Fecha de entrega:* ${fecha}\n\n`;
            
            mensaje += `*✨ MI SELECCIÓN:*\n`;
            mensaje += `*💐 Arreglo:* ${arreglo}\n`;
            mensaje += `*🥟 Pastelitos:* ${pastelitos}\n`;
            mensaje += `*🎈 Globo:* ${globo}\n`;
            mensaje += `*💌 Tarjeta:* ${tarjeta}\n\n`;
            
            if(detalles.trim() !== "") {
                mensaje += `*📝 Detalles/Especificaciones:*\n${detalles}\n\n`;
            }
            
            mensaje += `*Espero su confirmación para coordinar el pago. ¡Gracias!* ✨`;

            // Codificar y redirigir
            const url = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>

```
